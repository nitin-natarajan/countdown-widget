
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .wrap { background: #191919; border-radius: 12px; overflow: hidden; font-family: 'DM Mono', monospace; }

  .setup-panel { padding: 2rem 2rem 1.6rem; border-bottom: 1px solid #252525; }
  .setup-title { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.2em; color: #444; text-transform: uppercase; margin-bottom: 1rem; }
  .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 10px; letter-spacing: 0.12em; color: #444; text-transform: uppercase; }
  .field-input { background: #242424; border: 1px solid #333; border-radius: 7px; color: #ccc; font-family: 'DM Mono', monospace; font-size: 13px; padding: 8px 10px; outline: none; width: 100%; transition: border-color 0.2s; }
  .field-input:focus { border-color: #555; color: #eee; }
  .field-input.error { border-color: #c0392b; animation: shake 0.35s ease; }
  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.3); cursor: pointer; }
  .event-input { background: #242424; border: 1px solid #333; border-radius: 7px; color: #ccc; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 10px; outline: none; width: 100%; transition: border-color 0.2s; margin-bottom: 10px; }
  .event-input:focus { border-color: #555; color: #eee; }
  .event-input::placeholder { color: #333; }
  .start-btn { width: 100%; background: #2a2a2a; border: 1px solid #e8c87a44; border-radius: 7px; color: #e8c87a; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; padding: 9px; cursor: pointer; text-transform: uppercase; transition: background 0.15s, border-color 0.15s; }
  .start-btn:hover { background: #333; border-color: #e8c87a88; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .timer-panel { padding: 2rem 2rem 1.8rem; }

  .header-area { margin-bottom: 1.6rem; cursor: pointer; display: inline-block; }
  .header-area:hover .date-display { color: #555; border-bottom-color: #3a3a3a; }
  .event-name-display { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; color: #555; text-transform: uppercase; margin-bottom: 3px; }
  .date-display { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: #333; letter-spacing: 0.02em; display: inline-block; border-bottom: 1px solid transparent; transition: color 0.15s, border-color 0.15s; padding-bottom: 1px; }

  .countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.4rem; }

  .unit-block { background: #252525; border: 1px solid #303030; border-radius: 10px; padding: 1rem 0.4rem 0.8rem; text-align: center; position: relative; overflow: hidden; transition: border-color 0.6s ease; }
  .unit-block::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent); }

  .unit-num { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; color: #f0f0f0; line-height: 1; letter-spacing: -0.02em; display: block; transition: color 3s ease; }
  .unit-lbl { font-size: 9px; letter-spacing: 0.2em; color: #404040; text-transform: uppercase; margin-top: 5px; display: block; }

  .footer-time { font-size: 10px; color: #303030; letter-spacing: 0.06em; text-align: right; font-variant-numeric: tabular-nums; }

  .timesup { display: none; text-align: center; padding: 0.5rem 0 0.2rem; }
  .timesup-text { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; color: #555; text-transform: uppercase; }
  .timesup-sub { font-size: 11px; color: #333; margin-top: 4px; letter-spacing: 0.06em; cursor: pointer; transition: color 0.15s; }
  .timesup-sub:hover { color: #555; }

  @media (max-width: 380px) { .unit-num { font-size: 1.8rem; } .fields-row { grid-template-columns: 1fr; } }
</style>

<div class="wrap">
  <div class="setup-panel" id="setup-panel">
    <div class="setup-title">New countdown</div>
    <input class="event-input" id="event-name-input" type="text" placeholder="What are you counting down to?" maxlength="40" />
    <div class="fields-row">
      <div class="field-group">
        <span class="field-label">Date</span>
        <input class="field-input" id="date-input" type="date" />
      </div>
      <div class="field-group">
        <span class="field-label">Time (optional)</span>
        <input class="field-input" id="time-input" type="time" value="00:00" />
      </div>
    </div>
    <button class="start-btn" onclick="startTimer()">Start countdown</button>
  </div>

  <div class="timer-panel" id="timer-panel" style="display:none;">
    <div class="header-area" onclick="editTimer()" title="Click to edit">
      <div class="event-name-display" id="display-name">Countdown</div>
      <div class="date-display" id="date-display"></div>
    </div>
    <div class="countdown-grid">
      <div class="unit-block" id="block-d"><span class="unit-num" id="days">--</span><span class="unit-lbl">days</span></div>
      <div class="unit-block" id="block-h"><span class="unit-num" id="hours">--</span><span class="unit-lbl">hours</span></div>
      <div class="unit-block" id="block-m"><span class="unit-num" id="mins">--</span><span class="unit-lbl">mins</span></div>
      <div class="unit-block" id="block-s"><span class="unit-num" id="secs">--</span><span class="unit-lbl">secs</span></div>
    </div>
    <div class="timesup" id="timesup">
      <div class="timesup-text" id="timesup-label">time's up</div>
      <div class="timesup-sub" onclick="editTimer()">set a new countdown</div>
    </div>
    <div class="footer-time" id="footer-time"></div>
  </div>
</div>

<script>
  let targetTS = null, interval = null, clockInterval = null;
  let prevS = -1, prevM = -1, prevH = -1;
  let savedName = '', savedDate = '', savedTime = '';
  let currentDaysColor = 'rgba(255,255,255,0.15)';

  document.getElementById('date-input').min = new Date().toISOString().split('T')[0];

  function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

  function lerpColor(r1,g1,b1,r2,g2,b2,t) {
    return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
  }

  function getDaysColor(days) {
    if (days >= 30) return 'rgb(240,240,240)';
    if (days >= 14) { const t=(30-days)/16; return lerpColor(240,240,240,240,130,50,t); }
    if (days >= 7)  { const t=(14-days)/7;  return lerpColor(240,130,50,255,30,10,t); }
    if (days >= 3)  { const t=(7-days)/4;   return lerpColor(255,30,10,220,0,0,t); }
    const t=(3-Math.max(0,days))/3; return lerpColor(220,0,0,160,0,0,t);
  }

  function pulseBlock(blockId, color) {
    const el = document.getElementById(blockId);
    const rgba = color.replace('rgb(', 'rgba(').replace(')', ',0.5)');
    el.style.borderColor = rgba;
    setTimeout(() => { el.style.borderColor = ''; }, 400);
  }

  function formatDateLabel(dateStr, timeStr) {
    const [y,mo,d] = dateStr.split('-').map(Number);
    const [h,mi] = (timeStr||'00:00').split(':').map(Number);
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    let label = `${months[mo-1]} ${d}, ${y}`;
    if (timeStr && timeStr !== '00:00') {
      const ampm = h>=12?'PM':'AM'; const h12 = h%12||12;
      label += `  ·  ${pad(h12)}:${pad(mi)} ${ampm}`;
    }
    return label;
  }

  function triggerError(el) {
    el.classList.remove('error');
    void el.offsetWidth;
    el.classList.add('error');
    setTimeout(() => el.classList.remove('error'), 400);
  }

  function startClock() {
    if (clockInterval) clearInterval(clockInterval);
    function updateClock() {
      const estDate = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
      const eh=estDate.getHours(), em=estDate.getMinutes(), es=estDate.getSeconds();
      const ampm=eh>=12?'PM':'AM'; const h12=eh%12||12;
      document.getElementById('footer-time').textContent = pad(h12)+':'+pad(em)+':'+pad(es)+' '+ampm;
    }
    updateClock();
    clockInterval = setInterval(updateClock, 1000);
  }

  function startTimer() {
    const dateVal = document.getElementById('date-input').value;
    const timeVal = document.getElementById('time-input').value || '00:00';
    const nameVal = document.getElementById('event-name-input').value.trim() || 'Countdown';

    if (!dateVal) { triggerError(document.getElementById('date-input')); return; }

    savedName = nameVal; savedDate = dateVal; savedTime = timeVal;
    const [y,mo,d] = dateVal.split('-').map(Number);
    const [h,mi] = timeVal.split(':').map(Number);
    targetTS = new Date(y, mo-1, d, h, mi, 0).getTime();

    document.getElementById('display-name').textContent = nameVal;
    document.getElementById('date-display').textContent = formatDateLabel(dateVal, timeVal);
    document.getElementById('timesup').style.display = 'none';
    document.getElementById('countdown-grid') && (document.querySelector('.countdown-grid').style.display = 'grid');
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('timer-panel').style.display = 'block';

    prevS=-1; prevM=-1; prevH=-1;
    if (interval) clearInterval(interval);
    startClock();
    tick();
    interval = setInterval(tick, 1000);
  }

  function editTimer() {
    if (interval) clearInterval(interval);
    if (clockInterval) clearInterval(clockInterval);
    document.getElementById('event-name-input').value = savedName;
    document.getElementById('date-input').value = savedDate;
    document.getElementById('time-input').value = savedTime || '00:00';
    document.getElementById('timer-panel').style.display = 'none';
    document.getElementById('setup-panel').style.display = 'block';
  }

  function tick() {
    const now = Date.now();
    const diff = targetTS - now;

    if (diff <= 0) {
      ['days','hours','mins','secs'].forEach(id => document.getElementById(id).textContent = '00');
      document.getElementById('days').style.color = 'rgb(160,0,0)';
      document.querySelector('.countdown-grid').style.opacity = '0.35';
      document.getElementById('timesup').style.display = 'block';
      const name = savedName || 'your event';
      document.getElementById('timesup-label').textContent = name + ' is here';
      if (interval) clearInterval(interval);
      return;
    }

    document.querySelector('.countdown-grid').style.opacity = '1';

    const totalSecs = Math.floor(diff/1000);
    const s=totalSecs%60, m=Math.floor(totalSecs/60)%60;
    const h=Math.floor(totalSecs/3600)%24, days=Math.floor(totalSecs/86400);

    currentDaysColor = getDaysColor(days);
    document.getElementById('days').textContent = pad(days);
    document.getElementById('days').style.color = currentDaysColor;

    if (s !== prevS) {
      document.getElementById('secs').textContent = pad(s);
      pulseBlock('block-s', 'rgb(200,200,200)');
      prevS = s;
    }
    if (m !== prevM) {
      document.getElementById('mins').textContent = pad(m);
      pulseBlock('block-m', 'rgb(200,200,200)');
      prevM = m;
    }
    if (h !== prevH) {
      document.getElementById('hours').textContent = pad(h);
      pulseBlock('block-h', 'rgb(200,200,200)');
      prevH = h;
    }

    pulseBlock('block-d', currentDaysColor);
  }
</script>
